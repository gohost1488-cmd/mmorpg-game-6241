<!DOCTYPE html><html><head><title>mmorpg-game-6241</title>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<style>body{margin:0;overflow:hidden;background:#000}#ui{position:absolute;top:10px;left:10px;color:white;z-index:10}</style>
</head><body><canvas id="c"></canvas><div id="ui">HP:100 | MP:100 | Level:1 | XP:0</div>
<script>
const canvas=document.getElementById('c'),engine=new BABYLON.Engine(canvas,true),scene=new BABYLON.Scene(engine);
scene.clearColor=new BABYLON.Color3(0.1,0.15,0.3);
const camera=new BABYLON.ArcRotateCamera("c",0,1.2,12,BABYLON.Vector3.Zero(),scene);
camera.attachControl(canvas,true);
new BABYLON.HemisphericLight("l",new BABYLON.Vector3(0,1,0),scene);
new BABYLON.PointLight("pl",new BABYLON.Vector3(0,2,5),scene);
BABYLON.MeshBuilder.CreateGround("g",{width:50,height:50},scene);
// NPC
const npc=BABYLON.MeshBuilder.CreateSphere("npc",{diameter:1},scene);npc.position=new BABYLON.Vector3(3,0.5,5);
const nm=new BABYLON.StandardMaterial("nm",scene);nm.diffuseColor=new BABYLON.Color3(1,0.8,0);npc.material=nm;
scene.registerBeforeRender(()=>{npc.rotation.y+=0.01});
canvas.onclick=()=>{const d=Math.sqrt(Math.pow(camera.position.x-npc.position.x,2)+Math.pow(camera.position.z-npc.position.z,2));if(d<5){document.getElementById('ui').textContent='HP:100 | MP:90 | Level:2 | XP:100'}};
engine.runRenderLoop(()=>scene.render());
window.addEventListener('resize',()=>engine.resize());
</script></body></html>
